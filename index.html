<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Emergency Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --app-bg: #11141a;
            --card-bg: #1b1f27;
            --text-primary: #f8f9fa;
            --text-muted: #9ca3af;
            --emergency-red: #ea4335;
            --emergency-glow: rgba(234, 67, 53, 0.4);
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-primary);
            padding: 1.5rem 1rem;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .emergency-header {
            text-align: center;
            padding: 1.5rem 0;
        }

        .emergency-header h1 {
            font-size: 2.2rem;
            color: var(--text-primary);
        }

        .emergency-header p {
            color: var(--emergency-red);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }

        section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #2d3545;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .panic-section {
            text-align: center;
            padding: 2.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .panic-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff5252 0%, #d50000 100%);
            border: 8px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 0 0 var(--emergency-glow), 0 20px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .active-panic {
            background: radial-gradient(circle, #ff1744 0%, #b71c1c 100%) !important;
            animation: flashPulse 1.2s infinite linear;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .incoming-alert-banner {
            background: #b71c1c;
            border: 2px solid #ff1744;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            animation: flashAlert 1s infinite alternate;
        }

        .incoming-alert-banner a {
            display: inline-block;
            background: white;
            color: #b71c1c;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-text {
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1rem;
            padding: 0 1rem;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--emergency-red);
            padding-left: 0.5rem;
        }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .data-box {
            background: #11141a;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #2d3545;
        }

        .data-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: bold;
        }

        .data-box .value {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00e676;
            font-weight: bold;
        }

        .notification-log {
            background: #11141a;
            border-radius: 10px;
            padding: 1rem;
            border: 1px solid #2d3545;
        }

        #broadcastLog {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .broadcast-node {
            font-size: 0.85rem;
            font-family: monospace;
            padding: 0.5rem 0;
            border-bottom: 1px solid #2d3545;
            color: #e0e0e0;
        }

        @keyframes flashPulse {
            0% { box-shadow: 0 0 0 0 var(--emergency-glow); }
            70% { box-shadow: 0 0 0 25px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }

        @keyframes flashAlert {
            0% { opacity: 0.9; }
            100% { opacity: 1; box-shadow: 0 0 20px #ff1744; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="emergency-header">
        <h1>SOS Emergency Hub</h1>
        <p>Instant Broadcaster Network</p>
    </header>

    <div class="incoming-alert-banner" id="incomingAlert">
        <h3 style="color: white; margin-bottom: 5px;">🚨 EMERGENCY SOS RECEIVED!</h3>
        <p id="alertDetails" style="color: #f8f9fa; font-size: 0.95rem;"></p>
        <a id="alertLink" href="#" target="_blank">TRACK DISTRESS TARGET</a>
    </div>

    <section class="panic-section">
        <button class="panic-button" id="sosButton" onclick="triggerEmergency()">
            TRIGGER SOS
        </button>
        <p class="status-text" id="statusMessage">System Idle. Press button to broadcast instantly to all users.</p>
    </section>

    <section class="tracking-section">
        <h2>Your Transmission Status</h2>
        <div class="telemetry-grid">
            <div class="data-box">
                <span class="label">Latitude</span><br>
                <span class="value" id="latValue">--.------</span>
            </div>
            <div class="data-box">
                <span class="label">Longitude</span><br>
                <span class="value" id="lonValue">--.------</span>
            </div>
        </div>
        <div class="notification-log">
            <h3 style="font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem;">Live Shared Network Activity Log</h3>
            <ul id="broadcastLog">
                <li id="emptyLog" style="color: #4b5563; font-style: italic;">Monitoring live network lines...</li>
            </ul>
        </div>
    </section>
</div>

<script>
    let sendInterval = null;
    const networkChannel = "mohsin_emergency_broadcast_sub_system"; 

    window.onload = function() {
        startNetworkListener();
    };

    function triggerEmergency() {
        const btn = document.getElementById('sosButton');
        const status = document.getElementById('statusMessage');

        if (btn.classList.contains('active-panic')) {
            clearInterval(sendInterval);
            btn.classList.remove('active-panic');
            btn.innerText = 'TRIGGER SOS';
            status.innerText = "Broadcast terminated. Secure.";
            return;
        }

        btn.classList.add('active-panic');
        btn.innerText = 'SOS ACTIVE';
        status.innerText = "Transmitting live automated location alert payloads to all network nodes...";

        broadcastLocation();
        sendInterval = setInterval(broadcastLocation, 5000); 
    }

    function broadcastLocation() {
        const latDisp = document.getElementById('latValue');
        const lonDisp = document.getElementById('lonValue');
        const status = document.getElementById('statusMessage');

        // Network Geolocation Fetch (Bypasses local app permission block)
        fetch('https://ipapi.co/json/')
        .then(response => response.json())
        .then(data => {
            if (data.latitude && data.longitude) {
                const lat = data.latitude.toFixed(6);
                const lon = data.longitude.toFixed(6);
                
                latDisp.innerText = lat;
                lonDisp.innerText = lon;

                // Send to the shared network pipeline
                fetch(`https://ntfy.sh/${networkChannel}`, {
                    method: 'POST',
                    body: `SOS Alert! Coordinates: ${lat}, ${lon}`,
                    headers: { 'Title': '🚨 EMERGENCY SOS ACTIVE' }
                });
            } else {
                status.innerText = "Network positioning unavailable. Checking lines...";
            }
        })
        .catch(() => {
            status.innerText = "Connection error while establishing location sync.";
        });
    }

    function startNetworkListener() {
        const log = document.getElementById('broadcastLog');
        const emptyLog = document.getElementById('emptyLog');
        const alertBanner = document.getElementById('incomingAlert');
        const alertDetails = document.getElementById('alertDetails');
        const alertLink = document.getElementById('alertLink');

        const eventSource = new EventSource(`https://ntfy.sh/${networkChannel}/sse`);
        
        eventSource.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (!data.message) return;

            if (emptyLog) emptyLog.style.display = 'none';
            const timestamp = new Date().toLocaleTimeString();
            const msg = data.message;
            const coordMatch = msg.match(/Coordinates:\s*([\d.-]+),\s*([\d.-]+)/);
            
            const entry = document.createElement('li');
            entry.className = "broadcast-node";
            entry.innerHTML = `<strong>[${timestamp}]</strong> Network Alert Intercepted: ${msg}`;
            log.insertBefore(entry, log.firstChild);

            if (coordMatch) {
                const lat = coordMatch[1];
                const lon = coordMatch[2];
                
                alertDetails.innerText = `Another user broadcasted distress! Coordinates: ${lat}, ${lon}`;
                alertLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                alertBanner.style.display = 'block'; 
                
                if (navigator.vibrate) navigator.vibrate([500, 300, 500]);
            }
        };
    }
</script>

</body>
</html>
