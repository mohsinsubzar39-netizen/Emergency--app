<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Emergency Hub</title>
    <!-- Automatic Push Notification Delivery Module -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(function() {
        OneSignal.init({
          appId: "YOUR_ONESIGNAL_APP_ID_HERE", // Replace this with your free OneSignal App ID
          safari_web_id: "web.onesignal.auto.su",
          notifyButton: { enable: true },
        });
      });
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --app-bg: #11141a;
            --card-bg: #1b1f27;
            --text-primary: #f8f9fa;
            --text-muted: #9ca3af;
            --emergency-red: #ea4335;
            --emergency-glow: rgba(234, 67, 53, 0.4);
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-primary);
            padding: 1.5rem 1rem;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .emergency-header {
            text-align: center;
            padding: 1.5rem 0;
        }

        .emergency-header h1 {
            font-size: 2.2rem;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .emergency-header p {
            color: var(--emergency-red);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.25rem;
        }

        section {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid #2d3545;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .panic-section {
            text-align: center;
            padding: 2.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .panic-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff5252 0%, #d50000 100%);
            border: 8px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 0 0 var(--emergency-glow), 0 20px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .active-panic {
            background: radial-gradient(circle, #ff1744 0%, #b71c1c 100%) !important;
            animation: flashPulse 1.2s infinite linear;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .status-text {
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1rem;
            padding: 0 1rem;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--emergency-red);
            padding-left: 0.5rem;
        }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .data-box {
            background: #11141a;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #2d3545;
            display: flex;
            flex-direction: column;
        }

        .data-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .data-box .value {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00e676;
            font-weight: bold;
        }

        .notification-log {
            background: #11141a;
            border-radius: 10px;
            padding: 1rem;
            border: 1px solid #2d3545;
        }

        .notification-log h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        #broadcastLog {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .broadcast-node {
            font-size: 0.85rem;
            font-family: monospace;
            padding: 0.4rem 0;
            border-bottom: 1px solid #2d3545;
            color: #e0e0e0;
        }

        @keyframes flashPulse {
            0% { box-shadow: 0 0 0 0 var(--emergency-glow); }
            70% { box-shadow: 0 0 0 25px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="emergency-header">
        <h1>SOS Emergency Hub</h1>
        <p>Instant Broadcaster Network</p>
    </header>

    <section class="panic-section">
        <button class="panic-button" id="sosButton" onclick="triggerEmergency()">
            TRIGGER SOS
        </button>
        <p class="status-text" id="statusMessage">System Idle. Press button to push broadcast.</p>
    </section>

    <section class="tracking-section">
        <h2>Active Telemetry Link</h2>
        <div class="telemetry-grid">
            <div class="data-box">
                <span class="label">Latitude</span>
                <span class="value" id="latValue">--.------</span>
            </div>
            <div class="data-box">
                <span class="label">Longitude</span>
                <span class="value" id="lonValue">--.------</span>
            </div>
        </div>
        <div class="notification-log">
            <h3>System Status Log</h3>
            <ul id="broadcastLog">
                <li style="color: #4b5563; font-style: italic;">Broadcaster ready.</li>
            </ul>
        </div>
    </section>
</div>

<script>
    let broadcastInterval = null;

    function triggerEmergency() {
        const btn = document.getElementById('sosButton');
        const status = document.getElementById('statusMessage');

        if (btn.classList.contains('active-panic')) {
            clearInterval(broadcastInterval);
            btn.classList.remove('active-panic');
            btn.innerText = 'TRIGGER SOS';
            status.innerText = "Broadcast terminated.";
            return;
        }

        btn.classList.add('active-panic');
        btn.innerText = 'BROADCASTING...';
        status.innerText = "Transmitting device data instantly via network notifications...";

        // Fetch location instantly with no lag parameters
        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            
            document.getElementById('latValue').innerText = lat;
            document.getElementById('lonValue').innerText = lon;

            // Trigger instant push alert to ALL devices registered to the app
            sendInstantGlobalNotification(lat, lon);
        }, null, { enableHighAccuracy: false, timeout: 4000 });
    }

    function sendInstantGlobalNotification(lat, lon) {
        const log = document.getElementById('broadcastLog');
        const timestamp = new Date().toLocaleTimeString();

        // OneSignal Network Push Pipeline - instantly pushes alert out to phone lockscreens
        fetch("https://onesignal.com/api/v1/notifications", {
            method: "POST",
            headers: {
                "Content-Type": "application/json; charset=utf-8",
                "Authorization": "Basic YOUR_REST_API_KEY_HERE" // Put OneSignal Key here
            },
            body: JSON.stringify({
                app_id: "YOUR_ONESIGNAL_APP_ID_HERE",
                included_segments: ["All"],
                headings: {"en": "🚨 CRITICAL SOS ALERT"},
                contents: {"en": `User needs help! Live coordinates: ${lat}, ${lon}`},
                url: `https://maps.google.com/?q=${lat},${lon}` // Clicking notification opens direction instantly
            })
        }).then(() => {
            const newEntry = document.createElement('li');
            newEntry.className = "broadcast-node";
            newEntry.innerHTML = `<strong>[${timestamp}]</strong> Notification fired to all users!`;
            log.insertBefore(newEntry, log.firstChild);
        }).catch(() => {});
    }
</script>

</body>
</html>
